<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenWA Deferred UX — mockup (indicator · polling · unlink · metrics)</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#fff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --indigo:#4f46e5; --indigo-050:#eef2ff; --emerald:#059669; --emerald-050:#ecfdf5;
    --amber:#d97706; --amber-050:#fffbeb; --slate-050:#f8fafc; --red:#dc2626; --red-050:#fef2f2;
    --radius:14px; --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Arabic",sans-serif;}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 20px 80px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:8px;flex-wrap:wrap}
  h1{font-size:20px;margin:0}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 0}
  .toggle{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px}
  .toggle button{border:0;background:transparent;padding:6px 14px;border-radius:999px;font-size:13px;cursor:pointer;color:var(--muted)}
  .toggle button.on{background:var(--indigo);color:#fff}
  .sectlabel{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:30px 0 10px;font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card .hd{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .card .hd .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--indigo-050);color:var(--indigo)}
  .card .hd h3{margin:0;font-size:15px}
  .card .hd .hint{font-size:12px;color:var(--muted);margin-top:1px}
  .card .bd{padding:18px}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;border-radius:999px;padding:5px 11px;line-height:1}
  .pill .dot{width:8px;height:8px;border-radius:50%}
  .pill.ok{background:var(--emerald-050);color:var(--emerald)} .pill.ok .dot{background:var(--emerald)}
  .pill.down{background:var(--amber-050);color:var(--amber)} .pill.down .dot{background:var(--amber)}
  .pill.err{background:var(--red-050);color:var(--red)} .pill.err .dot{background:var(--red)}
  .pill.off{background:var(--slate-050);color:var(--muted)} .pill.off .dot{background:#94a3b8}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;gap:8px;align-items:center;color:var(--ink)}
  .btn.primary{background:var(--indigo);border-color:var(--indigo);color:#fff}
  .btn.danger{background:var(--red);border-color:var(--red);color:#fff}
  .btn.ghostdanger{background:#fff;border-color:#fecaca;color:var(--red)}
  .btn.ghost{background:transparent}
  .btn.small{padding:6px 10px;font-size:12.5px}
  .muted{color:var(--muted);font-size:13px}
  .cap{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.55}
  .lu{width:1.05em;height:1.05em;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px}

  /* ---- fake app header mock ---- */
  .hdrwrap{display:flex;flex-direction:column;gap:14px}
  .hdrlabel{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);font-weight:600}
  .hdr{display:flex;align-items:center;gap:16px;padding:10px 16px;border:1px solid var(--line);border-radius:12px;background:#fff}
  .hdr .logo{width:30px;height:30px;border-radius:50%;background:var(--indigo-050);display:grid;place-items:center;color:var(--indigo);font-size:11px;font-weight:800;flex:0 0 auto}
  .hdr nav{display:flex;gap:2px;font-size:12.5px;color:#475569}
  .hdr nav span{padding:5px 9px;border-radius:8px}
  .hdr nav span.act{color:var(--indigo);font-weight:700}
  .hdr .cluster{margin-inline-start:auto;display:flex;align-items:center;gap:6px}
  .icbtn{position:relative;width:32px;height:32px;display:grid;place-items:center;border-radius:8px;color:#475569;background:transparent}
  .icbtn.wa{border:1px dashed transparent}
  .icbtn.hi{background:var(--indigo-050);color:var(--indigo)}
  .statdot{position:absolute;top:3px;inset-inline-end:3px;width:9px;height:9px;border-radius:50%;border:2px solid #fff}
  .statdot.ok{background:var(--emerald)}
  .statdot.down{background:var(--amber);animation:pulse 1.6s ease-in-out infinite}
  .statdot.err{background:var(--red)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.45)}50%{box-shadow:0 0 0 5px rgba(217,119,6,0)}}
  .ghostslot{width:32px;height:32px;border:1px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:#cbd5e1;font-size:14px}
  .tip{position:relative;max-width:290px;margin-top:10px;background:#0f172a;color:#f8fafc;border-radius:10px;padding:10px 13px;font-size:12.5px;line-height:1.5}
  .tip::before{content:"";position:absolute;top:-6px;inset-inline-start:22px;border:6px solid transparent;border-bottom-color:#0f172a;border-top:0}
  .tip b{display:block;font-size:12.5px}
  .tip .sub2{color:#94a3b8;margin-top:2px;display:block}

  /* ---- spec table ---- */
  table.spec{width:100%;border-collapse:collapse;font-size:13px}
  table.spec th{text-align:start;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line)}
  table.spec td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.spec tr:last-child td{border-bottom:0}
  table.spec td.mono{font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
  .tag{display:inline-block;background:var(--slate-050);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:11.5px;color:#475569;font-weight:600}

  /* ---- status row + dialogs ---- */
  .statusrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);border-radius:12px;background:var(--slate-050)}
  .statusrow .grow{flex:1}
  .dialog{max-width:430px;margin:0 auto}
  .danger-zone{margin-top:16px;border:1px solid #fecaca;border-radius:12px;padding:13px 15px;background:var(--red-050)}
  .danger-zone b{font-size:13.5px;color:var(--red)}
  .danger-zone p{margin:4px 0 10px;font-size:12.5px;color:#7f1d1d;line-height:1.55}
  .alert{max-width:400px;margin:14px auto 0;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px}
  .alert h4{margin:0 0 8px;font-size:15px;display:flex;align-items:center;gap:9px;color:var(--red)}
  .alert p{margin:0 0 6px;font-size:13px;color:#334155;line-height:1.6}
  .alert ul{margin:6px 0 0;padding-inline-start:18px;font-size:12.5px;color:#475569;line-height:1.7}
  .alert .acts{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}

  /* ---- metrics widget ---- */
  .widget{max-width:520px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
  @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .stat b{display:block;font-size:20px;font-variant-numeric:tabular-nums;line-height:1.2}
  .stat span{font-size:11.5px;color:var(--muted);font-weight:600}
  .stat.ok b{color:var(--emerald)} .stat.err b{color:var(--red)} .stat.warn b{color:var(--amber)}
  .faillist{margin-top:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .failrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12.5px}
  .failrow:last-child{border-bottom:0}
  .failrow .who{font-weight:600}
  .failrow .why{color:var(--muted)}
  .failrow .when{margin-inline-start:auto;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.55}
  .states2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  @media(max-width:820px){.states2{grid-template-columns:1fr}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-wa" viewBox="0 0 24 24"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></symbol>
    <symbol id="i-qr" viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></symbol>
    <symbol id="i-unlink" viewBox="0 0 24 24"><path d="M9 17H7A5 5 0 0 1 7 7"/><path d="M15 7h2a5 5 0 0 1 4 8"/><line x1="2" y1="2" x2="22" y2="22"/></symbol>
    <symbol id="i-chart" viewBox="0 0 24 24"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></symbol>
    <symbol id="i-timer" viewBox="0 0 24 24"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></symbol>
    <symbol id="i-bell" viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></symbol>
    <symbol id="i-moon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></symbol>
    <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
    <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21H3v-5"/></symbol>
    <symbol id="i-shield" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></symbol>
  </defs>
</svg>

<div class="wrap">
  <div class="top">
    <div>
      <h1>OpenWA — deferred UX <span class="muted">(mockup)</span></h1>
      <p class="sub" data-en="The 4 pieces deferred from the connection-ux plan: global header indicator, background polling, unlink/logout, delivery metrics. Toggle EN/AR to check RTL."
         data-ar="الأجزاء الأربعة المؤجلة من خطة تجربة الاتصال: مؤشر الترويسة العام، الفحص الدوري في الخلفية، إلغاء الربط، ومقاييس التسليم. بدّل بين العربية والإنجليزية لفحص الاتجاه."></p>
    </div>
    <div class="toggle">
      <button id="en" class="on" onclick="setDir('ltr','en')">English</button>
      <button id="ar" onclick="setDir('rtl','ar')">عربي</button>
    </div>
  </div>

  <!-- ============================================================
       1 · GLOBAL HEADER CONNECTION INDICATOR
       ============================================================ -->
  <div class="sectlabel" data-en="1 · Global header connection indicator (TopNav right cluster)"
       data-ar="١ · مؤشر الاتصال في الترويسة العامة (مجموعة الأدوات في TopNav)"></div>

  <div class="card">
    <div class="bd hdrwrap">

      <!-- CONNECTED -->
      <div>
        <div class="hdrlabel"><span class="pill ok"><span class="dot"></span><span data-en="Connected — quiet" data-ar="متصل — هادئ"></span></span>
          <span class="muted" data-en="visible only to users with messages.broadcast; hidden entirely when state = disabled"
                data-ar="يظهر فقط لمن يملك صلاحية messages.broadcast؛ ويُخفى تمامًا عندما تكون الحالة disabled"></span></div>
        <div class="hdr">
          <div class="logo">G</div>
          <nav><span class="act" data-en="Dashboard" data-ar="الرئيسية"></span><span data-en="Records" data-ar="السجلات"></span><span data-en="Employees" data-ar="الموظفون"></span><span data-en="Messages" data-ar="الرسائل"></span></nav>
          <div class="cluster">
            <span class="icbtn" style="font-size:11.5px;font-weight:700">Aa</span>
            <span class="icbtn" style="font-size:11.5px;font-weight:700">ع</span>
            <span class="icbtn"><svg class="lu"><use href="#i-moon"/></svg></span>
            <span class="icbtn wa" title="WhatsApp connected"><svg class="lu"><use href="#i-wa"/></svg><span class="statdot ok"></span></span>
            <span class="icbtn"><svg class="lu"><use href="#i-bell"/></svg></span>
            <span class="icbtn"><svg class="lu"><use href="#i-user"/></svg></span>
          </div>
        </div>
      </div>

      <!-- DISCONNECTED -->
      <div>
        <div class="hdrlabel"><span class="pill down"><span class="dot"></span><span data-en="Disconnected — pulses" data-ar="غير متصل — نبض"></span></span>
          <span class="muted" data-en="session not linked; a re-scan fixes it. Click → /messages/broadcast" data-ar="الجلسة غير مرتبطة؛ إعادة مسح الرمز تصلحها. النقر → صفحة الإرسال إلى مجموعة"></span></div>
        <div class="hdr">
          <div class="logo">G</div>
          <nav><span class="act" data-en="Dashboard" data-ar="الرئيسية"></span><span data-en="Records" data-ar="السجلات"></span><span data-en="Employees" data-ar="الموظفون"></span><span data-en="Messages" data-ar="الرسائل"></span></nav>
          <div class="cluster">
            <span class="icbtn" style="font-size:11.5px;font-weight:700">Aa</span>
            <span class="icbtn" style="font-size:11.5px;font-weight:700">ع</span>
            <span class="icbtn"><svg class="lu"><use href="#i-moon"/></svg></span>
            <span class="icbtn wa hi"><svg class="lu"><use href="#i-wa"/></svg><span class="statdot down"></span></span>
            <span class="icbtn"><svg class="lu"><use href="#i-bell"/></svg></span>
            <span class="icbtn"><svg class="lu"><use href="#i-user"/></svg></span>
          </div>
        </div>
        <div class="tip" style="margin-inline-start:auto;margin-inline-end:110px">
          <b data-en="WhatsApp session is down" data-ar="جلسة واتساب متوقفة"></b>
          <span class="sub2" data-en="Group sends are paused · checked 25s ago" data-ar="إرسال المجموعات متوقف · آخر فحص قبل 25 ثانية"></span>
          <span class="sub2" data-en="Click to open Send to Group and reconnect" data-ar="انقر لفتح صفحة الإرسال إلى مجموعة وإعادة الاتصال"></span>
        </div>
      </div>

      <!-- UNREACHABLE -->
      <div>
        <div class="hdrlabel"><span class="pill err"><span class="dot"></span><span data-en="Unreachable — steady red" data-ar="تعذّر الوصول — أحمر ثابت"></span></span>
          <span class="muted" data-en="gateway container/service down on the server; a QR scan will NOT help — never merged with “disconnected”"
                data-ar="خدمة/حاوية البوابة متوقفة على الخادم؛ مسح الرمز لن يفيد — لا تُدمج أبدًا مع «غير متصل»"></span></div>
        <div class="hdr">
          <div class="logo">G</div>
          <nav><span class="act" data-en="Dashboard" data-ar="الرئيسية"></span><span data-en="Records" data-ar="السجلات"></span><span data-en="Employees" data-ar="الموظفون"></span><span data-en="Messages" data-ar="الرسائل"></span></nav>
          <div class="cluster">
            <span class="icbtn" style="font-size:11.5px;font-weight:700">Aa</span>
            <span class="icbtn" style="font-size:11.5px;font-weight:700">ع</span>
            <span class="icbtn"><svg class="lu"><use href="#i-moon"/></svg></span>
            <span class="icbtn wa"><svg class="lu"><use href="#i-wa"/></svg><span class="statdot err"></span></span>
            <span class="icbtn"><svg class="lu"><use href="#i-bell"/></svg></span>
            <span class="icbtn"><svg class="lu"><use href="#i-user"/></svg></span>
          </div>
        </div>
        <div class="tip" style="margin-inline-start:auto;margin-inline-end:110px">
          <b data-en="Gateway service isn’t running" data-ar="خدمة البوابة لا تعمل"></b>
          <span class="sub2" data-en="The WhatsApp gateway on the server is unreachable — restart the service (admin)." data-ar="تعذّر الوصول إلى بوابة واتساب على الخادم — أعد تشغيل الخدمة (مشرف)."></span>
        </div>
      </div>

      <!-- DISABLED -->
      <div>
        <div class="hdrlabel"><span class="pill off"><span class="dot"></span><span data-en="Disabled — rendered nothing" data-ar="غير مفعّل — لا يُعرض شيء"></span></span>
          <span class="muted" data-en="feature dormant (GSSG_OPENWA_ENABLED off): no icon, no polling, zero header noise"
                data-ar="الميزة خاملة (GSSG_OPENWA_ENABLED مطفأ): لا أيقونة، لا فحص دوري، لا ضجيج في الترويسة"></span></div>
        <div class="hdr">
          <div class="logo">G</div>
          <nav><span class="act" data-en="Dashboard" data-ar="الرئيسية"></span><span data-en="Records" data-ar="السجلات"></span><span data-en="Employees" data-ar="الموظفون"></span><span data-en="Messages" data-ar="الرسائل"></span></nav>
          <div class="cluster">
            <span class="icbtn" style="font-size:11.5px;font-weight:700">Aa</span>
            <span class="icbtn" style="font-size:11.5px;font-weight:700">ع</span>
            <span class="icbtn"><svg class="lu"><use href="#i-moon"/></svg></span>
            <span class="ghostslot" title="no indicator">·</span>
            <span class="icbtn"><svg class="lu"><use href="#i-bell"/></svg></span>
            <span class="icbtn"><svg class="lu"><use href="#i-user"/></svg></span>
          </div>
        </div>
      </div>

      <p class="cap"
         data-en="Placement: inside the existing right utilities cluster (ms-auto), between the theme toggle and the bell — the cluster already mirrors under RTL via flex + logical margins, and the status dot is anchored with inset-inline-end so it stays on the trailing corner in both directions. Awareness only: the button is a plain link-button (navigate to Send-to-Group); management (QR, unlink) stays on that page. Desktop TopNav only in v1 — MobileTopBar is intentionally minimal; mobile users get the page banner."
         data-ar="الموضع: داخل مجموعة الأدوات الحالية (ms-auto)، بين مبدّل السمة والجرس — المجموعة تنعكس تلقائيًا في الاتجاه العربي عبر flex والهوامش المنطقية، ونقطة الحالة مثبّتة بـ inset-inline-end فتبقى في الزاوية الخلفية في الاتجاهين. المؤشر للتنبيه فقط: النقر ينقل إلى صفحة الإرسال إلى مجموعة؛ الإدارة (الرمز، إلغاء الربط) تبقى هناك. في الإصدار الأول: الترويسة المكتبية فقط — ترويسة الجوال مقصودة أن تبقى بسيطة، ويكتفي مستخدم الجوال بلافتة الصفحة."></p>
    </div>
  </div>

  <!-- ============================================================
       2 · BACKGROUND STATUS POLLING
       ============================================================ -->
  <div class="sectlabel" data-en="2 · Background status polling (one shared query, tiered intervals)"
       data-ar="٢ · الفحص الدوري في الخلفية (استعلام واحد مشترك، فترات متدرجة)"></div>

  <div class="card">
    <div class="hd">
      <div class="ic"><svg class="lu"><use href="#i-timer"/></svg></div>
      <div><h3 data-en="One query key — ['gateway-status'] — three observers" data-ar="مفتاح استعلام واحد — ['gateway-status'] — ثلاثة مراقبين"></h3>
        <div class="hint" data-en="React Query dedupes; the fastest active interval wins. No new state, no sockets." data-ar="تدمج React Query الطلبات؛ وتفوز أقصر فترة نشطة. لا حالة جديدة ولا مقابس."></div></div>
    </div>
    <div class="bd">
      <table class="spec">
        <thead><tr>
          <th data-en="Surface" data-ar="السطح"></th>
          <th data-en="Polls when" data-ar="يفحص عندما"></th>
          <th data-en="Interval" data-ar="الفترة"></th>
          <th data-en="Notes" data-ar="ملاحظات"></th>
        </tr></thead>
        <tbody>
          <tr>
            <td data-en="Header indicator (new)" data-ar="مؤشر الترويسة (جديد)"></td>
            <td data-en="signed-in, has messages.broadcast, tab visible, state ≠ disabled" data-ar="مسجّل الدخول، يملك messages.broadcast، التبويب ظاهر، والحالة ≠ disabled"></td>
            <td class="mono">60s</td>
            <td data-en="refetchInterval as a function → returns false once “disabled” is seen (stop forever); refetchOnWindowFocus on; pauses when the tab is hidden (default)." data-ar="refetchInterval كدالة → تعيد false فور ظهور «disabled» (توقّف نهائي)؛ إعادة الفحص عند التركيز مفعّلة؛ يتوقف عند إخفاء التبويب (السلوك الافتراضي)."></td>
          </tr>
          <tr>
            <td data-en="Send-to-Group page (existing)" data-ar="صفحة الإرسال إلى مجموعة (حالي)"></td>
            <td data-en="on mount / focus" data-ar="عند الفتح / التركيز"></td>
            <td class="mono" data-en="staleTime 30s" data-ar="staleTime 30s"></td>
            <td data-en="unchanged — it now ALSO receives the indicator’s 60s refreshes for free (shared cache), so the blocked banner reflects a drop within ≤60s." data-ar="بدون تغيير — تستفيد الآن مجانًا من تحديثات المؤشر كل 60 ثانية (ذاكرة مشتركة)، فتعكس اللافتة أي انقطاع خلال ≤60 ثانية."></td>
          </tr>
          <tr>
            <td data-en="QR connect dialog (existing)" data-ar="نافذة ربط الرمز (حالية)"></td>
            <td data-en="only while open" data-ar="أثناء الفتح فقط"></td>
            <td class="mono">3s</td>
            <td data-en="unchanged; smallest interval among observers wins while the dialog is open, then falls back to 60s." data-ar="بدون تغيير؛ أقصر فترة بين المراقبين تسود أثناء فتح النافذة، ثم يعود الإيقاع إلى 60 ثانية."></td>
          </tr>
          <tr>
            <td><span data-en="Server-side guard (new)" data-ar="حارس جهة الخادم (جديد)"></span> <span class="tag">backend</span></td>
            <td data-en="every /announcements/status call" data-ar="مع كل نداء ‎/announcements/status‎"></td>
            <td class="mono" data-en="TTL ~15s" data-ar="TTL ~15s"></td>
            <td data-en="tiny in-process cache on session_state() for the status route + a SHORT probe timeout (~3s, not the transport’s 10s) so an unreachable gateway can’t hold workers while N clients poll." data-ar="ذاكرة مؤقتة صغيرة داخل العملية لنتيجة session_state()‎ لمسار الحالة + مهلة فحص قصيرة (~3 ثوانٍ بدل 10) حتى لا تحتجز بوابة متعطلة العمّال بينما يفحص عدة عملاء."></td>
          </tr>
        </tbody>
      </table>
      <p class="cap"
         data-en="Detection budget: a session drop shows in the header within ≤60s (task target 30–60s) and in the dialog within 3s. Explicitly NOT doing: SSE push of gateway state (the app has an SSE channel — nice later, over-scoped now), polling while logged out or on the lock screen, and any polling at all when the feature is disabled."
         data-ar="ميزانية الاكتشاف: انقطاع الجلسة يظهر في الترويسة خلال ≤60 ثانية (الهدف 30–60 ثانية) وفي النافذة خلال 3 ثوانٍ. مستبعد صراحةً: دفع الحالة عبر SSE (القناة موجودة في التطبيق — جيدة لاحقًا، مبالغة الآن)، والفحص أثناء تسجيل الخروج أو شاشة القفل، وأي فحص إطلاقًا عندما تكون الميزة غير مفعّلة."></p>
    </div>
  </div>

  <!-- ============================================================
       3 · UNLINK / LOGOUT
       ============================================================ -->
  <div class="sectlabel" data-en="3 · Unlink / logout (switch office numbers) — admin only"
       data-ar="٣ · إلغاء الربط / تسجيل الخروج (تبديل رقم المكتب) — للمشرف فقط"></div>

  <div class="states2">
    <!-- entry point: connected status row on Send-to-Group -->
    <div class="card">
      <div class="hd">
        <div class="ic" style="background:var(--emerald-050);color:var(--emerald)"><svg class="lu"><use href="#i-wa"/></svg></div>
        <div><h3 data-en="Entry point — Send-to-Group, connected state" data-ar="نقطة الدخول — صفحة الإرسال إلى مجموعة، وهي متصلة"></h3>
          <div class="hint" data-en="a compact status row appears above the form ONLY for settings.edit admins while connected" data-ar="صف حالة مصغّر يظهر فوق النموذج لمشرفي settings.edit فقط أثناء الاتصال"></div></div>
      </div>
      <div class="bd">
        <div class="statusrow">
          <span class="pill ok"><span class="dot"></span><span data-en="WhatsApp connected" data-ar="واتساب متصل"></span></span>
          <span class="muted grow" data-en="checked 18s ago" data-ar="آخر فحص قبل 18 ثانية"></span>
          <button class="btn small ghost"><svg class="lu"><use href="#i-qr"/></svg><span data-en="Re-scan QR" data-ar="إعادة مسح الرمز"></span></button>
          <button class="btn small ghostdanger"><svg class="lu"><use href="#i-unlink"/></svg><span data-en="Unlink phone…" data-ar="إلغاء ربط الهاتف…"></span></button>
        </div>
        <p class="cap"
           data-en="Non-admins with messages.broadcast see nothing extra while connected (no status row, no unlink). Keeping unlink on this page — not in the header, not in Settings — preserves the earlier decision that gateway management lives inline on Send-to-Group."
           data-ar="من يملك messages.broadcast دون صلاحية المشرف لا يرى شيئًا إضافيًا أثناء الاتصال (لا صف حالة ولا إلغاء ربط). إبقاء إلغاء الربط في هذه الصفحة — لا في الترويسة ولا في الإعدادات — يحافظ على القرار السابق بأن إدارة البوابة تتم داخل صفحة الإرسال إلى مجموعة."></p>
      </div>
    </div>

    <!-- confirm dialog -->
    <div class="card">
      <div class="hd">
        <div class="ic" style="background:var(--red-050);color:var(--red)"><svg class="lu"><use href="#i-shield"/></svg></div>
        <div><h3 data-en="Destructive confirm (Radix AlertDialog)" data-ar="تأكيد الإجراء الخطر (Radix AlertDialog)"></h3>
          <div class="hint" data-en="plain-language consequences; destructive button is NOT the default focus" data-ar="عواقب بلغة واضحة؛ الزر الخطر ليس محور التركيز الافتراضي"></div></div>
      </div>
      <div class="bd">
        <div class="alert">
          <h4><svg class="lu"><use href="#i-alert"/></svg><span data-en="Unlink the office WhatsApp?" data-ar="إلغاء ربط واتساب المكتب؟"></span></h4>
          <p data-en="This signs the gateway out of the current WhatsApp account. Until an admin scans a new QR:" data-ar="سيسجَّل خروج البوابة من حساب واتساب الحالي. وإلى أن يمسح مشرفٌ رمزًا جديدًا:"></p>
          <ul>
            <li data-en="Group announcements stop — they are not sent another way." data-ar="تتوقف إعلانات المجموعات — ولا تُرسل بطريقة أخرى."></li>
            <li data-en="Employee WhatsApp notifications stop (eligible ones route to SMS)." data-ar="تتوقف إشعارات واتساب للموظفين (وتتحول المؤهلة منها إلى SMS)."></li>
          </ul>
          <div class="acts">
            <button class="btn small" data-en="Keep linked" data-ar="إبقاء الربط"></button>
            <button class="btn small danger" data-en="Unlink" data-ar="إلغاء الربط"></button>
          </div>
        </div>
        <p class="cap"
           data-en="After confirm: POST /announcements/unlink (settings.edit-gated, audit-logged with the acting user) → status flips to “disconnected” → the page banner appears and the existing QR dialog opens automatically so re-linking the new number is one continuous flow. The SMS line above is allowed here (it is true for individual notifications) but the group line explicitly says groups are NOT sent another way — never “falls back to SMS” for groups."
           data-ar="بعد التأكيد: POST ‎/announcements/unlink‎ (بحراسة settings.edit وتسجيل تدقيقي باسم المنفّذ) → تتحول الحالة إلى «غير متصل» → تظهر لافتة الصفحة وتُفتح نافذة الرمز الحالية تلقائيًا ليكون ربط الرقم الجديد مسارًا واحدًا متصلًا. عبارة SMS أعلاه جائزة هنا (صحيحة للإشعارات الفردية)، أما سطر المجموعات فيقول صراحة إنها لا تُرسل بطريقة أخرى — لا «تحويل إلى SMS» للمجموعات أبدًا."></p>
      </div>
    </div>
  </div>

  <!-- ============================================================
       4 · DELIVERY METRICS
       ============================================================ -->
  <div class="sectlabel" data-en="4 · Delivery metrics — smallest useful surface: a dashboard widget"
       data-ar="٤ · مقاييس التسليم — أصغر سطح مفيد: ودجت في لوحة المعلومات"></div>

  <div class="card widget">
    <div class="hd">
      <div class="ic"><svg class="lu"><use href="#i-chart"/></svg></div>
      <div><h3 data-en="Message delivery — last 7 days" data-ar="تسليم الرسائل — آخر 7 أيام"></h3>
        <div class="hint" data-en="employee notifications (outbound_messages) · WhatsApp + SMS" data-ar="إشعارات الموظفين (outbound_messages) · واتساب + SMS"></div></div>
      <span class="pill ok" style="margin-inline-start:auto"><span class="dot"></span><span data-en="Gateway up" data-ar="البوابة تعمل"></span></span>
    </div>
    <div class="bd">
      <div class="stats">
        <div class="stat"><b>128</b><span data-en="Sent" data-ar="مُرسلة"></span></div>
        <div class="stat ok"><b>117</b><span data-en="Delivered" data-ar="تم التسليم"></span></div>
        <div class="stat err"><b>6</b><span data-en="Failed" data-ar="فشلت"></span></div>
        <div class="stat warn"><b>9</b><span data-en="Fell back to SMS" data-ar="تحولت إلى SMS"></span></div>
      </div>
      <p class="note" data-en="5 pending confirmation — delivery states refresh with the existing 5-minute poller." data-ar="5 رسائل بانتظار التأكيد — تُحدَّث حالات التسليم عبر الفاحص الدوري الحالي كل 5 دقائق."></p>

      <div class="faillist">
        <div class="failrow"><svg class="lu" style="color:var(--red)"><use href="#i-alert"/></svg>
          <span class="who" dir="auto">أحمد الحربي</span>
          <span class="why" data-en="number not on WhatsApp" data-ar="الرقم ليس على واتساب"></span>
          <span class="when" data-en="Today 09:14" data-ar="اليوم 09:14"></span></div>
        <div class="failrow"><svg class="lu" style="color:var(--red)"><use href="#i-alert"/></svg>
          <span class="who" dir="auto">خالد السبيعي</span>
          <span class="why" data-en="gateway timeout" data-ar="انتهت مهلة البوابة"></span>
          <span class="when" data-en="Yesterday 16:40" data-ar="أمس 16:40"></span></div>
      </div>
      <div class="row">
        <button class="btn small ghost"><svg class="lu"><use href="#i-refresh"/></svg><span data-en="Refresh" data-ar="تحديث"></span></button>
        <span class="muted" data-en="Full history & filters — deferred" data-ar="السجل الكامل والتصفية — مؤجل"></span>
      </div>
      <p class="cap"
         data-en="Counting (server-side, one GET /notifications/metrics?days=7): sent = status ‘sent’; failed = status ‘failed’; delivered = delivery_state in {delivered, read, Delivered} (WA lowercase vs SMS capitalized — normalize in the query); fell back = fell_back true; pending = sent with no terminal delivery_state. Rolling window on created_at. Group announcements are a DIFFERENT table (group_announcement_sends) and already have a per-send result panel — keep them out of v1 or add later as one extra ‘groups: sent/failed’ line."
         data-ar="الحساب (جهة الخادم، نداء واحد GET ‎/notifications/metrics?days=7‎): مُرسلة = الحالة ‘sent’؛ فشلت = ‘failed’؛ تم التسليم = delivery_state ضمن {delivered, read, Delivered} (واتساب بحروف صغيرة وSMS بحرف كبير — توحَّد في الاستعلام)؛ تحولت = fell_back؛ بانتظار = مُرسلة دون حالة تسليم نهائية. النافذة متحركة على created_at. أما إعلانات المجموعات فجدول مختلف (group_announcement_sends) ولها لوحة نتائج فورية بالفعل — تُستبعد من الإصدار الأول أو تضاف لاحقًا كسطر واحد «المجموعات: مُرسلة/فشلت»."></p>
    </div>
  </div>

  <p class="note" style="margin-top:26px"
     data-en="Scope flags: pieces 1–3 are one small plan (indicator + shared polling + unlink share the same status query and the same page). Piece 4 (metrics) touches a new endpoint, a repo aggregate, the widget registry and privacy review of failure rows — recommend it as its OWN follow-up plan."
     data-ar="حدود النطاق: الأجزاء 1–3 خطة صغيرة واحدة (المؤشر والفحص المشترك وإلغاء الربط تتشارك استعلام الحالة نفسه والصفحة نفسها). أما الجزء 4 (المقاييس) فيمسّ نقطة نهاية جديدة واستعلامًا تجميعيًا وسجلّ الودجات ومراجعة خصوصية صفوف الفشل — يُنصح بجعله خطة لاحقة مستقلة."></p>
</div>

<script>
  function setDir(dir,lang){
    document.documentElement.dir=dir; document.documentElement.lang=lang;
    document.getElementById('en').classList.toggle('on',lang==='en');
    document.getElementById('ar').classList.toggle('on',lang==='ar');
    document.querySelectorAll('[data-en]').forEach(function(el){
      el.textContent = el.getAttribute('data-'+lang);
    });
  }
  setDir('ltr','en');
</script>
</body>
</html>
