services:
  waha:
    # Pin to a digest before production: docker.io/devlikeapro/waha@sha256:...
    image: docker.io/devlikeapro/waha:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:2785:3000"
    environment:
      WAHA_API_KEY: "${OPENWA_API_KEY}"
      WHATSAPP_START_SESSION: "gssg"
      WHATSAPP_RESTART_ALL_SESSIONS: "True"
      # NOWEB (Baileys) engine — reliable QR linking; the default WEBJS (Chromium) engine failed to link.
      WHATSAPP_DEFAULT_ENGINE: "NOWEB"
    volumes:
      - waha_sessions:/app/.sessions

volumes:
  waha_sessions:
