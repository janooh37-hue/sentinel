services:
  openwa:
    # Pin to a verified published tag/digest before going to production.
    # Check https://hub.docker.com/r/rmyndharis/openwa/tags and replace "latest"
    # with the exact tag or digest (e.g. rmyndharis/openwa@sha256:...).
    image: rmyndharis/openwa:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:2785:2785"
    environment:
      API_KEY: "${OPENWA_API_KEY}"
      ENGINE_TYPE: "whatsapp-web.js"
    volumes:
      - openwa_session:/app/session

volumes:
  openwa_session:
